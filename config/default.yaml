# Professional Robotics Framework Configuration

camera:
  index: 0
  # source overrides index — set to a device index (int) or stream URL (string)
  # Examples:
  #   source: 0                               # built-in webcam
  #   source: "http://192.168.1.5:8080/video" # IP Webcam Android app
  #   source: "http://192.168.1.5:4747/video" # DroidCam Android/iOS
  width: 1280
  height: 720
  fps: 30
  timeout_s: 2.0
  max_reconnect_attempts: 5
  reconnect_delay_s: 1.0

detectors:
  aruco:
    enabled: true
    dictionary: "DICT_6X6_250"
    downsample_width: 1280
    show_rejected: false
    marker_length_m: 0.20
    turn_trigger_distance_m: 1.5
    camera_matrix: [[800, 0, 640], [0, 800, 360], [0, 0, 1]]
    dist_coeffs: [[0, 0, 0, 0]]
  barcode:
    enabled: false
    min_pixel_area: 20000
  feature:
    enabled: false
    min_matches: 15
    match_distance_threshold: 50
  yolo:
    enabled: true
    model: "yolov8n.pt"        # downloaded automatically on first run
    confidence: 0.50           # minimum detection confidence
    danger_zone_ratio: 0.12    # bbox/frame area fraction that triggers E-STOP
    device: "cpu"              # "cpu", "cuda", or "mps"

navigation:
  turn_cooldown_s: 10.0
  max_cross_track_error_m: 0.5
  max_heading_error_deg: 15.0
  smoothing_alpha: 0.3
  dead_zone_x: 20
  recovery_timeout_s: 2.0
  min_state_duration_s: 0.5

controller:
  can_interface: "virtual"
  can_channel: "can0"
  can_bitrate: 500000
  turn_command_id: 291
  turn_command_data: [1, 0, 0, 0, 0, 0, 0, 0]

safety:
  max_stale_frame_ms: 1500
  enable_auto_recovery: true
  min_fps_warning: 5.0

recording:
  enabled: false
  output_dir: "recordings"
  save_raw_frames: true
  save_annotated_frames: true
  save_metadata_json: true

validation:
  pose_stability_threshold: 0.8
  jitter_warning_m: 0.05
  min_confidence: 0.6
  enable_stability_overlay: true

normalization:
  enabled: true
  method: "CLAHE"
  clahe_clip_limit: 2.0
  clahe_grid_size: [8, 8]
  gamma_correction: 1.2

testing:
  active_mode: "NORMAL"
  draw_mode_overlay: true

dashboard:
  enabled: true
  host: "0.0.0.0"
  port: 5000

debug:
  visualize_commands: true
  draw_pose_axes: true
  show_performance: true
  show_latency_graph: true
  draw_path_history: true
  history_maxlen: 30
